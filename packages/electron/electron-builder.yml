appId: com.dune.app
productName: Dune
copyright: Copyright (c) 2025 Dune

directories:
  output: ../../.release

files:
  - dist/**/*
  - assets/**/*

extraResources:
  - from: ../frontend/dist
    to: frontend/dist
    filter:
      - "**/*"

  - from: ../backend/package.json
    to: backend/package.json

  - from: ../backend/dist
    to: backend/dist
    filter:
      - "**/*"

  - from: ../backend/bin
    to: backend/bin
    filter:
      - "dune-host-operator-helper"

  - from: ../backend/src/agent-skills
    to: backend/agent-skills
    filter:
      - "**/*"

  - from: ../backend/src/agent-mcp
    to: backend/agent-mcp
    filter:
      - "**/*.py"

  - from: ../backend/src/agent-prompts
    to: backend/agent-prompts
    filter:
      - "**/*"

  - from: ../../.release/_backend_deps
    to: backend/node_modules
    filter:
      - "**/*"

npmRebuild: true

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  sign: false
  title: Dune

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: assets/icon.png

win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
